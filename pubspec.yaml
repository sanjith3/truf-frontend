name: turfzone
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  iconsax_flutter: ^1.0.0
  video_player: ^2.8.3
  chewie: ^1.5.0
  photo_view: ^0.14.0
  url_launcher: ^6.1.12
  intl: ^0.19.0
  image_picker: ^1.0.4
  cached_network_image: ^3.4.1
  geolocator: ^10.0.0
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.4
  http: ^1.2.0
  razorpay_flutter: ^1.3.7
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  screenshot: ^3.0.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/icons/payments/
    - assets/images/handshake.png
    - assets/images/tournament_coming_soon.png

flutter_native_splash:
  color: "#001510"
  android: true
  ios: true

  android_12:
    color: "#001510"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#1DB954"
